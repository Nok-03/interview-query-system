<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>雲端版面試查詢系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // 1. 初始化 Supabase 連線 (請將下方的網址與 Key 替換成你在 Supabase 後台看到的資訊)
    // 設定路徑：Project Settings -> API
    const SUPABASE_URL = 'https://juurnbbqisuszitifqsx.supabase.co/rest/v1/';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1dXJuYmJxaXN1c3ppdGlmcXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Nzg3NzksImV4cCI6MjA5NTM1NDc3OX0.Fc8JNJ4oQvvif4vxAsBQ3u4mV_C0MUnr4LtM4QUfDLY';
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function InterviewQuerySystem() {
      const [searchMethod, setSearchMethod] = useState('ticket'); // ticket, phone, id_card
      const [inputName, setInputName] = useState('');
      const [inputValue, setInputValue] = useState('');
      const [result, setResult] = useState(null);
      const [errorMsg, setErrorMsg] = useState('');
      const [isLoading, setIsLoading] = useState(false); // 新增：動態載入狀態

      // 2. 改寫為 async 函式，因為向雲端要資料需要等待時間
      const handleSearch = async (e) => {
        e.preventDefault();
        setErrorMsg('');
        setResult(null);

        if (!inputName.trim() || !inputValue.trim()) {
          setErrorMsg('請完整輸入姓名與查詢號碼');
          return;
        }

        setIsLoading(true); // 開始轉圈圈或顯示載入中

        try {
          // 3. 學習重點：直接向雲端資料庫發起條件查詢
          // 語法解讀：從 students 資料表選擇所有欄位，其中 name 等於輸入值，且對應的驗證欄位等於輸入值
          const { data, error } = await supabase
            .from('students')
            .select('*')
            .eq('name', inputName.trim())
            .eq(searchMethod, inputValue.trim()); // 這裡的 searchMethod 剛好對應資料庫欄位名

          if (error) throw error; // 如果連線或語法有錯，跳到 catch 區塊

          // 4. 判斷是否有查到符合條件的考生
          if (data && data.length > 0) {
            setResult(data[0]); // 找到資料，更新狀態
          } else {
            setErrorMsg('查無此資料，請確認輸入資訊是否正確');
          }
        } catch (error) {
          console.error('資料庫查詢失敗:', error.message);
          setErrorMsg('連線失敗，請檢查網路或系統設定');
        } finally {
          setIsLoading(false); // 無論成功或失敗，結束載入狀態
        }
      };

      return (
        <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4">
          <div className="bg-white rounded-xl shadow-lg p-6 sm:p-8 w-full max-w-md">
            <h1 className="text-2xl font-bold text-center text-gray-800 mb-6">甄選面試查詢系統 (雲端版)</h1>
            
            <form onSubmit={handleSearch} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">考生姓名</label>
                <input type="text" value={inputName} onChange={(e) => setInputName(e.target.value)} className="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="請輸入姓名" />
              </div>
              
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">驗證方式</label>
                <select value={searchMethod} onChange={(e) => { setSearchMethod(e.target.value); setInputValue(''); }} className="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                  <option value="ticket">准考證號碼</option>
                  <option value="phone">手機號碼</option>
                  <option value="id_card">身分證字號</option>
                </select>
              </div>
              
              <div>
                <input type="text" value={inputValue} onChange={(e) => setInputValue(e.target.value)} className="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder={`請輸入${searchMethod === 'ticket' ? '准考證' : searchMethod === 'phone' ? '手機' : '身分證'}號碼`} />
              </div>

              {errorMsg && <div className="text-red-500 text-sm font-medium text-center">{errorMsg}</div>}
              
              <button type="submit" disabled={isLoading} className="w-full bg-blue-600 text-white font-bold rounded-lg p-3 mt-4 hover:bg-blue-700 transition duration-200 disabled:bg-gray-400">
                {isLoading ? '查詢中...' : '查詢面試資訊'}
              </button>
            </form>

            {result && (
              <div className="mt-8 border-t pt-6">
                <h2 className="text-xl font-bold text-gray-800 mb-4 text-center border-b-2 border-blue-500 inline-block pb-1">面試報到資訊</h2>
                <div className="space-y-3 bg-blue-50 p-4 rounded-lg">
                  <p className="flex justify-between border-b border-blue-100 pb-2"><span className="text-gray-600 font-medium">考生姓名：</span><span className="font-bold text-gray-900">{result.name}</span></p>
                  <p className="flex justify-between border-b border-blue-100 pb-2"><span className="text-gray-600 font-medium">報考類別：</span><span className="font-bold text-gray-900">{result.category}</span></p>
                  <p className="flex justify-between border-b border-blue-100 pb-2 text-blue-700"><span className="font-medium">報到時間：</span><span className="font-bold text-lg">{result.time}</span></p>
                  <p className="flex justify-between text-blue-700"><span className="font-medium">報到地點：</span><span className="font-bold">{result.location}</span></p>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<InterviewQuerySystem />);
  </script>
</body>
</html>
